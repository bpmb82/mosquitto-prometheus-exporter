name: Update en release

on:
  push:
    branches:
      - master

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Bump Version
        id: get_ver
        run: |
          current_version=$(grep "^version =" Cargo.toml | head -n 1 | cut -d '"' -f 2)
          IFS='.' read -r major minor patch <<< "$current_version"
          new_version="$major.$minor.$((patch + 1))"
          sed -i "0,/version = \".*\"/s//version = \"$new_version\"/" Cargo.toml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump version to $new_version [skip ci]"
          git push
          echo "version=$new_version" >> $GITHUB_OUTPUT

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
      
      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git
        
      - name: Build
        run: cross build --release --target ${{ matrix.target }}
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/mosquitto-prometheus-exporter      - name: Prepare Binaries
        run: |
          mkdir -p bin-${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/mosquitto-prometheus-exporter bin-${{ matrix.arch }}/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: bin-${{ matrix.arch }}/

  docker-and-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mosquitto-exporter:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mosquitto-exporter:${{ needs.build-and-release.outputs.new_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-and-release.outputs.new_version }}
          token: ${{ secrets.GH_TOKEN }}
          files: |
            bin-amd64/mosquitto-prometheus-exporter
            bin-arm64/mosquitto-prometheus-exporter

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_USERNAME }}/mosquitto-exporter
          short-description: "Prometheus exporter for Mosquitto MQTT broker metrics, written in Rust."
          readme-filepath: ./README.md